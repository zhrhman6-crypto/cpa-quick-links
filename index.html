<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الروابط السريعة للموظف</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #1a202c;
            margin-bottom: 40px;
            font-size: 28px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background-color: #ffffff;
            border-radius: 12px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #2d3748;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden; /* لمنع اللون من الخروج عن الزوايا المنحنية */
            border: 1px solid #e2e8f0;
        }

        /* اللون الخفيف في أعلى المربع */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px; /* سمك الشريط العلوي */
            background-color: #3182ce; /* لون افتراضي (أزرق) */
            opacity: 0.8;
        }

        /* تغيير ألوان الأشرطة العلوية لكل مربع لإضافة حيوية (اختياري) */
        .card:nth-child(1)::before { background-color: #48bb78; } /* أخضر */
        .card:nth-child(2)::before { background-color: #ed8936; } /* برتقالي */
        .card:nth-child(3)::before { background-color: #4299e1; } /* أزرق */
        .card:nth-child(4)::before { background-color: #9f7aea; } /* بنفسجي */
        .card:nth-child(5)::before { background-color: #f56565; } /* أحمر */
        .card:nth-child(6)::before { background-color: #38b2ac; } /* تركوازي */
        .card:nth-child(7)::before { background-color: #667eea; } /* نيلي */
        .card:nth-child(8)::before { background-color: #ecc94b; } /* أصفر */
        .card:nth-child(9)::before { background-color: #a0aec0; } /* رمادي */

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.1);
            background-color: #f7fafc;
            color: #1a365d;
        }

        @media (max-width: 500px) {
            .container {
                grid-template-columns: 1fr 1fr; /* مربعين بجانب بعض في الجوال */
                gap: 15px;
            }
            .card {
                height: 110px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <h1>تطبيق الروابط السريعة للموظف</h1>
